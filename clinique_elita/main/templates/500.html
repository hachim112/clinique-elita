{% extends 'base.html' %}
{% block title %} - 500 Server Error{% endblock %}
{% block content %}
<style>
.error-container { text-align: center; padding: 6rem 2rem; }
.error-code {
    font-size: 8rem;
    font-weight: 800;
    color: #ef4444;
    animation: shake 0.8s ease;
}
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
    20%, 40%, 60%, 80% { transform: translateX(5px); }
}
</style>
<div class="container">
    <div class="error-container">
        <div class="error-code">500</div>
        <h2 class="error-msg">Server Error</h2>
        <p class="error-sub">Something went wrong on our end. Please try again later.</p>
        <a href="{% url 'home' %}" class="btn btn-primary"><i class="fas fa-home"></i> Back to Home</a>
    </div>
</div>
{% endblock %}
