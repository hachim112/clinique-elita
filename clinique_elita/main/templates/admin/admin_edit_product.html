{% extends 'admin/admin_base.html' %}
{% block title %} - Edit Product{% endblock %}
{% block admin_content %}
<div class="page-header">
    <div>
        <h2>Edit Product</h2>
        <p class="page-subtitle">Update product information and settings</p>
    </div>
    <a href="{% url 'admin_products' %}" class="btn btn-outline">← Back to Products</a>
</div>
<div class="card" style="padding:2rem;max-width:800px;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;">
            <div class="form-group" style="grid-column:1/-1;">
                <label><strong>Product Name</strong></label>
                <input type="text" name="name" value="{{ product.name }}" required class="form-control">
            </div>
            <div class="form-group" style="grid-column:1/-1;">
                <label><strong>Description</strong></label>
                <textarea name="description" rows="4" class="form-control">{{ product.description }}</textarea>
            </div>
            <div class="form-group">
                <label><strong>Price (DZD)</strong></label>
                <input type="number" step="0.01" name="price" value="{{ product.price }}" required class="form-control">
            </div>
            <div class="form-group">
                <label><strong>Stock Quantity</strong></label>
                <input type="number" name="stock" value="{{ product.stock }}" required class="form-control">
            </div>
            <div class="form-group">
                <label><strong>Category</strong></label>
                <select name="category" required class="form-control">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if product.category.id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label><strong>Rating (0.0 – 5.0)</strong></label>
                <input type="number" step="0.01" min="0" max="5" name="rating" value="{{ product.rating }}" class="form-control">
            </div>
            <div class="form-group">
                <label><strong>Product Image</strong></label>
                <input type="file" name="image" class="form-control">
                {% if product.image %}
                <div style="margin-top:0.75rem;">
                    <img src="{{ product.image.url }}" style="width:80px;height:80px;border-radius:10px;object-fit:cover;box-shadow:var(--shadow);">
                    <p style="font-size:0.78rem;color:var(--text-light);margin-top:4px;">Current image</p>
                </div>
                {% endif %}
            </div>
            <div class="form-group">
                <label><strong>Visibility</strong></label>
                <select name="is_hidden" class="form-control">
                    <option value="False" {% if not product.is_hidden %}selected{% endif %}>🟢 Visible</option>
                    <option value="True" {% if product.is_hidden %}selected{% endif %}>🔴 Hidden</option>
                </select>
            </div>
        </div>
        <div style="display:flex;gap:1rem;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid #f1f5f9;">
            <button type="submit" class="btn btn-primary">💾 Save Changes</button>
            <a href="{% url 'admin_products' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
