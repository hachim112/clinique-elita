{% extends 'admin/admin_base.html' %}
{% block title %} - Edit Category{% endblock %}
{% block admin_content %}
<div class="page-header">
    <div>
        <h2>Edit Category</h2>
        <p class="page-subtitle">Update category information</p>
    </div>
    <a href="{% url 'admin_categories' %}" class="btn btn-outline">← Back to Categories</a>
</div>
<div class="card" style="padding:2rem;max-width:600px;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label><strong>Category Name</strong></label>
            <input type="text" name="name" required value="{{ category.name }}" class="form-control">
        </div>
        <div class="form-group">
            <label><strong>Slug</strong></label>
            <input type="text" name="slug" value="{{ category.slug }}" class="form-control">
        </div>
        <div class="form-group">
            <label><strong>Description</strong></label>
            <textarea name="description" rows="3" class="form-control">{{ category.description }}</textarea>
        </div>
        <div class="form-group">
            <label><strong>Image</strong></label>
            <input type="file" name="image" class="form-control">
            {% if category.image %}
            <div style="margin-top:0.75rem;">
                <img src="{{ category.image|media_url }}" style="width:70px;height:70px;border-radius:10px;object-fit:cover;box-shadow:var(--shadow);">
                <p style="font-size:0.78rem;color:var(--text-light);margin-top:4px;">Current image</p>
            </div>
            {% endif %}
        </div>
        <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                <input type="checkbox" name="is_active" {% if category.is_active %}checked{% endif %}> <strong>Active</strong>
            </label>
        </div>
        <div style="display:flex;gap:1rem;margin-top:1rem;">
            <button type="submit" class="btn btn-primary">💾 Save Changes</button>
            <a href="{% url 'admin_categories' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
